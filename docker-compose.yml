version: "3.9"

# =============================================================================
# UltimateTracker – stack completa
# Serviços: postgres, backend, bot, frontend, nginx, prometheus, loki, grafana
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Banco de dados
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ultimatetracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ultimatetracker}
      POSTGRES_DB: ${POSTGRES_DB:-ultimatetracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ultimatetracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Backend (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ultimatetracker}:${POSTGRES_PASSWORD:-ultimatetracker}@postgres:5432/${POSTGRES_DB:-ultimatetracker}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - internal
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
          - labels:
              level:
        loki-external-labels: "service=backend,compose_service={{.Name}}"

  # ---------------------------------------------------------------------------
  # Bot (Discord)
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: ./bot
    restart: unless-stopped
    env_file: ./bot/.env
    depends_on:
      - backend
    networks:
      - internal
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
        loki-external-labels: "service=bot,compose_service={{.Name}}"

  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    expose:
      - "3000"
    networks:
      - internal
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
        loki-external-labels: "service=frontend,compose_service={{.Name}}"

  # ---------------------------------------------------------------------------
  # Nginx – reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"
        loki-external-labels: "service=nginx,compose_service={{.Name}}"

  # ---------------------------------------------------------------------------
  # Nginx Prometheus Exporter
  # ---------------------------------------------------------------------------
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    restart: unless-stopped
    command:
      - "--nginx.scrape-uri=http://nginx/nginx_status"
    expose:
      - "9113"
    depends_on:
      - nginx
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # PostgreSQL Prometheus Exporter
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-ultimatetracker}:${POSTGRES_PASSWORD:-ultimatetracker}@postgres:5432/${POSTGRES_DB:-ultimatetracker}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Prometheus – coleta de métricas
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    expose:
      - "9090"
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Loki – agregação de logs
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    expose:
      - "3100"
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Grafana – visualização
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - internal

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  internal:
    driver: bridge
