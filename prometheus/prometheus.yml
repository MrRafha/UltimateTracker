global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Regras de alertas (adicione arquivos em alerting_rules/ conforme necessário)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:

  # Prometheus se auto-monitora
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Métricas do Backend FastAPI (endpoint /metrics exposto pelo instrumentator)
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: backend

  # Métricas do Nginx (stub_status via nginx-prometheus-exporter)
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]

  # Métricas do PostgreSQL (via postgres_exporter)
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
